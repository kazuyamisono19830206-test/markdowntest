name: Build HTML
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Pandoc
        run: sudo apt-get install -y pandoc
      
      - name: Convert to HTML
        run: pandoc lesson.md -o output.html
      
      - uses: actions/upload-artifact@v4
        with:
          name: html-output
          path: output.html
